---
name: "Update cloudflare bestip dns"

on:
  push:
    branches: [master, dev]
    paths:
      - ".github/workflows/cloudflare-bestip-dns-update.yml"
      - "scripts/cloudflare-bestip-dns-update.sh"
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: "Update cloudflare bestip dns"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Update cloudflare bestip dns"
        working-directory: scripts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_RECORD_NAME: ${{ secrets.CLOUDFLARE_RECORD_NAME }}
        run: bash cloudflare-bestip-dns-update.sh
