---
name: "Sync kubernetes core images"

on:
  push:
    branches: [master]
    paths:
      - "images/kubernetes-core-images.md"
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: "Sync kubernetes core images"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Setup docker buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Login to aliyun"
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: "Sync kubernetes core images"
        id: update
        shell: bash
        run: bash images/kubernetes-core-images.sh

      - name: "Commit and push changes"
        if: steps.update.outputs.bump_version != ''
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "docs: sync kubernetes core images by github actions [no ci]"
          commit_options: "--no-verify --signoff"
          file_pattern: "images/kubernetes-core-images.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
