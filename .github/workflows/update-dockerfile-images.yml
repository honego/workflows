---
name: "Update dockerfile images"

on:
  push:
  workflow_call:

jobs:
  update:
    name: "Update dockerfile images"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v7

      - name: "Setup updatecli"
        uses: updatecli/updatecli-action@v3.3.0

      - name: "Update image versions"
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/updatecli.yaml" <<'EOF'
          name: "Update dockerfile images"
          autodiscovery:
            crawlers:
              dockerfile:
                digest: true
          EOF
          updatecli apply --config "$RUNNER_TEMP/updatecli.yaml"

      - name: "Show changes"
        run: |
          git diff --stat
          git diff
