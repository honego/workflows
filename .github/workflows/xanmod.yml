---
name: "XanMod CI"

on:
  push:
    branches: [master, release]
    paths:
      - "infra/xanmod.sh"
      - ".github/workflows/xanmod.yml"
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "infra/xanmod.sh"
      - ".github/workflows/xanmod.yml"
  workflow_dispatch:

jobs:
  run:
    name: "XanMod install"
    strategy:
      fail-fast: false
      matrix:
        os:
          # debian
          - debian:bookworm # 12
          - debian:trixie # 13
          - debian:forky # 14 / testing
          - debian:sid # unstable rolling

          # ubuntu
          - ubuntu:22.04
          - ubuntu:24.04
          - ubuntu:25.04
          - ubuntu:26.04
          - ubuntu:rolling
          - ubuntu:devel

          # kali
          - kalilinux/kali-last-release # stable
          - kalilinux/kali-rolling # rolling
          - kalilinux/kali-experimental # experimental
        branch:
          - ""
          - "--mainline"
          - "--longterm"
          - "--edge"
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.os }}

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Run XanMod install"
        working-directory: infra
        run: |
          bash ci-deps.sh
          bash xanmod.sh --debug --mirror ${{ matrix.branch }}
