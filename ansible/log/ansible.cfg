[defaults]
inventory = ./hosts
local_tmp = $PWD/.ansible/tmp
forks = 20
gathering = explicit
host_key_checking = False
timeout = 60
deprecation_warnings = False
strategy = free
bin_ansible_callbacks = True
nocows = 1

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
pipelining = True
scp_if_ssh = True
