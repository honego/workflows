---
- name: "Check cross directory"
  ansible.builtin.find:
    depth: 1
    file_type: directory
    paths: "{{ base_path }}"
    patterns: "^crossserver[0-9]+$"
    use_regex: true
  register: cross_dir
  ignore_errors: true

- name: "Check cross log directory"
  ansible.builtin.stat:
    path: "{{ item.path }}/log"
  loop: "{{ cross_dir.files | default([]) }}"
  register: log_dir_stat

- ansible.builtin.include_role:
    name: public
  when:
    - log_dir_stat.results is defined
    - log_dir_stat.results | length > 0
