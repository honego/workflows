- name: "Clean game logs"
  ansible.builtin.command:
    chdir: "{{ item.invocation.module_args.path }}"
    cmd: find . -maxdepth 1 -type f -name "*.log" {{ log_retention_args }} -print -delete
  loop: "{{ log_dir_stat.results | default([]) }}"
  register: clean_result
  changed_when: (clean_result.stdout_lines | default([])) | length > 0
