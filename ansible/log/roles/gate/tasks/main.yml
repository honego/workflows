---
- name: "Check gate directory"
  ansible.builtin.find:
    depth: 1
    file_type: directory
    paths: "{{ base_path }}"
    patterns: "^gate*"
    use_regex: true
  register: gate_dir
  ignore_errors: true

# 确保日志路径存在
- name: "Check gate log directory"
  ansible.builtin.stat:
    path: "{{ item.path }}/log"
  loop: "{{ gate_dir.files | default([]) }}"
  register: log_dir_stat

- ansible.builtin.include_role:
    name: public
    tasks_from: main.yml
  when:
    - log_dir_stat.results is defined
    - log_dir_stat.results | length > 0
