- name: "Login path validation"
  ansible.builtin.stat:
    path: "{{ log_dir }}"
  register: log_dir_stat

- name: "Clean login logs"
  ansible.builtin.command:
    chdir: "{{ log_dir }}"
    cmd: find . -maxdepth 1 -type f -name "*.log" -mtime +{{ log_retention_days }} -print -delete
  register: clean_result
  when: log_dir_stat.stat.exists and log_dir_stat.stat.isdir
  changed_when: clean_result.stdout_lines | length > 0
