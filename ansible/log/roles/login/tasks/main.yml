---
- name: "Check login directory"
  ansible.builtin.find:
    depth: 1
    file_type: directory
    paths: "{{ base_path }}"
    patterns: "^login*"
    use_regex: true
  register: login_dir
  ignore_errors: true

# 确保日志路径存在
- name: "Check login log directory"
  ansible.builtin.stat:
    path: "{{ item.path }}/log"
  loop: "{{ login_dir.files | default([]) }}"
  register: log_dir_stat

- ansible.builtin.include_role:
    name: public
  when:
    - log_dir_stat.results is defined
    - log_dir_stat.results | length > 0
