<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Switch style colorful gamepad 48x48</title>
  <defs>
    <linearGradient id="screenGlow" x1="15" y1="14" x2="33" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2B2F46"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="1" y="6" width="46" height="36" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="6" y="13" width="36" height="22" rx="11" fill="#1F2937"/>
    <rect x="6" y="13" width="10.5" height="22" rx="11" fill="#13C7F3"/>
    <rect x="31.5" y="13" width="10.5" height="22" rx="11" fill="#FF5577"/>
    <rect x="15" y="14.5" width="18" height="19" rx="6" fill="url(#screenGlow)"/>
  </g>

  <circle cx="11.5" cy="18.7" r="1.9" fill="#0B1320" fill-opacity="0.92"/>
  <circle cx="36.5" cy="18.7" r="1.9" fill="#0B1320" fill-opacity="0.92"/>

  <g fill="#F8FAFC">
    <rect x="10.6" y="24.2" width="6.8" height="2.1" rx="1.05"/>
    <rect x="12.95" y="21.85" width="2.1" height="6.8" rx="1.05"/>
  </g>

  <g>
    <circle cx="34.2" cy="22.6" r="1.45" fill="#FFD93D"/>
    <circle cx="37.2" cy="25.6" r="1.45" fill="#FF5A5F"/>
    <circle cx="34.2" cy="28.6" r="1.45" fill="#34D399"/>
    <circle cx="31.2" cy="25.6" r="1.45" fill="#60A5FA"/>
  </g>

  <g fill="#94A3B8">
    <circle cx="19.5" cy="27.5" r="2.5"/>
    <circle cx="28.5" cy="27.5" r="2.5"/>
  </g>

  <g fill="#CBD5E1" fill-opacity="0.55">
    <rect x="18.3" y="17.5" width="4.8" height="1.3" rx="0.65"/>
    <rect x="24.9" y="17.5" width="4.8" height="1.3" rx="0.65"/>
  </g>
</svg>
