---
services:
  argus:
    image: ghcr.io/release-argus/argus:0.29.4
    container_name: argus
    restart: unless-stopped
    ports:
      - 127.0.0.1:8088:8080
    environment:
      ARGUS_UID: 911
      ARGUS_GID: 911
    volumes:
      - $PWD/config.yml:/app/config.yml
      - $PWD/data:/app/data
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8080/api/v1/healthcheck"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
    network_mode: bridge
