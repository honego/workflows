# https://github.com/apache/doris/blob/master/conf/fe.conf
# https://doris.apache.org/zh-CN/docs/4.x/admin-manual/config/fe-config

## Global
CUR_DATE=`date +%Y%m%d-%H%M%S`

# Log dir
LOG_DIR = ${DORIS_HOME}/log

# https://github.com/apache/doris/discussions/29780
# -Xmx -Xms
# FE 独立部署: 总内存 × 1/4
# FE 与 BE 混合部署: 总内存 × 1/8
JAVA_OPTS_FOR_JDK_17="-Dfile.encoding=UTF-8 -Djavax.security.auth.useSubjectCredsOnly=false -Xmx8192m -Xms8192m -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=$LOG_DIR -Xlog:gc*:$LOG_DIR/fe.gc.log.$CUR_DATE:time,uptime:filecount=10,filesize=50M -Darrow.enable_null_check_for_get=false --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED --add-opens=java.management/sun.management=ALL-UNNAMED --add-opens=java.base/jdk.internal.ref=ALL-UNNAMED --add-opens=java.xml/com.sun.org.apache.xerces.internal.jaxp=ALL-UNNAMED"
# JAVA_HOME=/path/to/jdk

## 元数据与集群管理
meta_dir = ${DORIS_HOME}/doris-meta # 存储元数据, 必须在启动 FE 之前创建
# bdbje_replica_ack_timeout_second = 10 # Master 等 Follower ack 元数据写入的超时, 网络慢 元数据写入大 FE 因 ack 超时退出时调到 30 / 60
# bdbje_lock_timeout_second = 5 # BDBJE lock timeout, 当 fe.warn.log 有大量 LockTimeoutException 才调大
# bdbje_heartbeat_timeout_second = 30 # master 和 follower 之间 bdbje 的心跳超时, 网络抖动或 FE 长 GC 导致误判时调到 60 / 90

# http://docs.oracle.com/cd/E17277_02/html/java/com/sleepycat/je/Durability.SyncPolicy.html
# replica_sync_policy = SYNC # Follower FE 同步刷盘策略 选项: SYNC NO_SYNC WRITE_NO_SYNC, 极端高元数据写入且 FE >=3 才考虑 WRITE_NO_SYNC 要压测
# master_sync_policy = SYNC # Master FE 同步刷盘策略

edit_log_port = 9010 # BDBJE 端口, 默认 9010

# metadata_checkpoint_memory_threshold = 60 # 可以动态配置, Jvm 内存使用百分比 (堆或旧内存池) 超过此阈值则检查点线程将无法工作以避免 OOM, 不要盲目调高先加 FE 堆内存
# cluster_id = -1 # 如果节点 (FE 或 BE) 具有相同的集群 id则将认为它们属于同一个集群, 普通部署让 Master 首次启动生成, 存算分离按官方要求显式指定
# enable_fqdn_mode = false # 此配置用于 k8s 部署环境, 当 enable_fqdn_mode 为 true 时将允许更改 be 的重建 pod 的 ip
initial_root_password = '' # 设置 root 用户初始化 2 阶段 SHA-1 加密密码, 默认为'', 即不设置 root 密码

## 服务 连接 RPC HTTP
query_port = 9030 # Doris FE 通过 mysql 协议查询连接端口
arrow_flight_sql_port = 8070 # Doris FE 通过 Arrow Flight SQL 协议查询连接端口
# priority_networks = 10.10.10.0/24;192.168.0.0/16
priority_networks = 10.46.96.0/22
http_port = 8030 # FE http 端口, 当前所有 FE http 端口都必须相同
# https_port = 8050 # FE https 端口, 当前所有 FE https 端口都必须相同
# enable_https = false # 是否启用 HTTPS
# enable_ssl = true # 默认值: true, doris 将与 mysql 服务 建立基于 SSL 协议的加密通道
qe_max_connection = 2048 # 每个 FE 的最大连接数 默认 1024, BI 连接池多时调 2048/4096, 同时系统 nofile 要够

rpc_port = 9020 # FE Thrift Server 端口, 默认 9020
thrift_server_type = THREAD_POOL # 默认 THREAD_POOL 海量短连接可评估 THREADED 但需压测

# 当 FE 存在高并发建连 短连接洪峰 连接超时 / 拒绝或 Listen queue overflow 时再调大 thrift_backlog_num 并同步调高 Linux somaxconn
# 默认值 1024, Linux 调优 net.core.somaxconn = 8192
thrift_backlog_num = 2048 # 中等并发 设置 2048, 高并发连接 / 有连接洪峰 设置 4096
# thrift_max_message_size = 104857600 # 默认值 100MB, FE RPC 单次请求消息大小上限, 超过该值会被拒绝并断开连接客户端可能报 connection has been closed by peer
# use_compact_thrift_rpc = true # 默认值: true, 压缩查询计划结构体, 开启后可以降低约 50% 的查询计划结构体大小

# max_mysql_service_task_threads_num = 4096 # 默认值 4096, mysql 中处理任务的最大线程数
# mysql_service_io_threads_num = 4 # 默认值 4, mysql 中处理 io 事件的线程数
mysql_nio_backlog_num = 2048 # MySQL NIO backlog 默认 1024, 和 thrift_backlog_num 一样配合 somaxconn 调优, 连接洪峰时调大
# drop_backend_after_decommission = false # BE decommission 后是否自动 drop, 自动化扩缩容才考虑设置为 true

# auth_token = '' # 用于内部身份验证的集群令牌, 不设置或设置为空字符串则不启用认证

# FE HTTP /api/query 提交 SQL 的最大处理线程数, 默认值 2, 只有大量并发通过 HTTP API 提交 SQL 且出现排队/拒绝/延迟时再调大
# 确认业务真的在高并发调用 FE 的 /api/query HTTP 接口执行 SQL, 而不是通过 9030 MySQL 协议查 SQL时才需要关注
# http_sql_submitter_max_worker_threads = 2

# FE HTTP /api/upload 导入任务提交线程数, 默认值 2, 只有大量并发通过 HTTP API 提交导入且出现提交排队/延迟/拒绝时再调大
# http_load_submitter_max_worker_threads = 2

## 查询引擎
# default_max_query_instances = 512 # 每个 FE 的最大查询实例数, 默认值 -1 则小于等于 0 表示不限制, 限制单个用户同时占用的查询执行实例数
lower_case_table_names = 1 # 表名统一转小写存储, 推荐新集群初始化时设为 1, 表名统一小写存储并大小写不敏感, 避免 SQL/BI/ETL 因大小写不一致导致找不到表
# table_name_length_limit = 64 # 用于控制最大的表名长度
# cache_enable_sql_mode = true # 默认值: true, 如果设置为 true, FE 会启用 sql 结果缓存, 该选项适用于离线数据更新场景
# cache_enable_partition_mode = true # 默认值: true, 如果设置为 true, FE 将从 BE cache 中获取数据, 该选项适用于部分分区的实时更新
# cache_result_max_row_count = 3000 # 默认值: 3000, 设置可以缓存的最大行数, 详细的原理可以参考官方文档: 操作手册 -> 分区缓存
# cache_result_max_data_size = 31457280 # 默认值: 31457280, 设置可以缓存的最大数据大小 单位 Bytes, 配合 cache_result_max_row_count 调整
# cache_last_version_interval_second = 30 # 默认值: 30, 缓存判断的版本间隔的最小间隔, 该参数区分离线更新和实时更新

# 默认值: false, FE 优先选择本机 BE 上的 Tablet 副本执行查询, 仅 FE / BE 混合部署、查询均匀打到各 FE、且副本数充足时开启, 用于减少跨节点数据访问
enable_local_replica_selection = true
enable_local_replica_selection_fallback = true # 默认值: false, # 本机副本不可用时允许选择其他 BE 副本, 避免因为只偏好本地副本导致查询失败或可用性下降

# FE 保留的查询 Profile 数量, 默认值 100, 排查慢查询/偶发问题时可适当调大, 避免问题发生后 Profile 被新查询覆盖
# 查询并发较高、慢查询排查频繁、Profile 很快被覆盖, 导致问题发生后查不到执行明细时可以调大
# max_query_profile_num = 500

## 导入与导出
default_max_filter_ratio = 0 # 导入容忍脏数据比例, 默认值 0 为严格模式, 只要数据有一条被过滤掉整个导入失败
max_unfinished_load_job = 1000 # 最大加载任务数, 包括 PENDING、ETL、LOADING、QUORUM_FINISHED, 如果超过此数量则不允许提交导入作业

# 单个节点 broker load 导入的默认并发度, 如果用户在提交 broker load 任务时, 在 properties 中自行指定了并发度, 则采用用户自定义的并发度
# 此参数将与 max_broker_concurrency min_bytes_per_broker_scanner 等多个配置共同决定导入任务的并发度
default_load_parallelism = 8
max_broker_concurrency = 10 # broker scanner 的最大并发数, HDFS / 对象存储导入瓶颈时调整
disable_hadoop_load = true # 默认不禁用, 将来不推荐使用 hadoop 集群 load, 设置为 true 以禁用这种 load 方式

export_running_job_num_limit = 5 # 运行导出作业的并发限制, 默认值为 5, 0 表示无限制

## 日志
log_roll_size_mb = 1024 # 一个系统日志和审计日志的最大大小, 默认值 1024 MB
# sys_log_dir = ${DORIS_HOME}/log # 默认值: DorisFE.DORIS_HOME_DIR + "/log"
sys_log_level = INFO # 日志级别, 可选项: INFO, WARN, ERROR, FATAL
sys_log_mode = ASYNC # 日志模式, 可选项: SYNC, ASYNC, 默认值 ASYNC 表示异步日志, SYNC 表示同步日志
sys_log_roll_num = 10 # 要保存在 sys_log_roll_interval 内的最大 FE 日志文件, 默认为 10, 表示一天最多有 10 个日志文件
# sys_log_verbose_modules = org.apache.doris # 默认值: {} FE 日志详细输出的模块列表, 逗号分隔, 例如 org.apache.doris.qe,org.apache.doris.load, 默认为空表示不启用日志详细输出
sys_log_roll_interval = DAY # FE 日志滚动周期, 可选项: MINUTE HOUR DAY, 默认值 DAY 表示每天一个日志文件
sys_log_delete_age = 7d # 删除日志文件的时间, 默认值 7d 表示删除 7 天前的日志文件, 也可以设置为 168h 表示删除 168 小时前的日志文件
sys_log_roll_mode = SIZE-MB-1024 # 日志滚动模式, 可选项: SIZE-MB-1024 TIME-HOUR-1, 默认值 SIZE-MB-1024 表示当日志文件大小达到 1024 MB 时滚动, TIME-HOUR-1 表示每小时滚动一次
sys_log_enable_compress = true # 是否启用日志压缩, 默认值 true, 启用后日志文件将以 .gz 格式压缩存储
# audit_log_dir = ${DORIS_HOME}/log # 默认值: DorisFE.DORIS_HOME_DIR + "/log"
audit_log_roll_num = 90 #  每个 audit_log_roll_interval 周期内最多保留的审计日志文件数, 默认值为 90, 当 interval = DAY 时表示每天最多保留 90 个审计日志切分文件
audit_log_modules = slow_query, query, load, stream_load # 默认值: {} FE 审计日志记录的模块列表, 逗号分隔, 例如 slow_query,query,load, 默认为空表示不启用审计日志
audit_log_roll_interval = DAY # FE 审计日志滚动周期, 可选项: MINUTE HOUR DAY, 默认值 DAY, 表示按天作为一个日志滚动周期
audit_log_delete_age = 7d # 删除审计日志文件的时间, 默认值 30d 表示删除 30 天前的审计日志文件, 也可以设置为 720h 表示删除 720 小时前的审计日志文件
audit_log_enable_compress = true # 是否启用审计日志压缩, 默认值 true, 启用后审计日志文件将以 .gz 格式压缩存储
# nereids_trace_log_dir=${DORIS_HOME}/log/nereids_trace # Nereids Trace 日志目录, 默认值 ${DORIS_HOME}/log/nereids_trace

## 存储

# Default dirs to put jdbc drivers,default value is ${DORIS_HOME}/jdbc_drivers
# jdbc_drivers_dir = ${DORIS_HOME}/jdbc_drivers

# meta_delay_toleration_second = 10
# qe_max_connection = 1024
# qe_query_timeout_second = 300
# qe_slow_log_ms = 5000

# Directory containing filesystem provider plugin subdirectories.
# Each subdirectory is one storage backend (e.g., s3/, hdfs/, azure/).
# If empty, only classpath-based built-in providers are used.
# filesystem_plugin_root = ${DORIS_HOME}/plugins/filesystem
