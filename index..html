  }

  button[class*="rounded-full"]::after,

      rgba(255, 255, 255, 0.1) 45%,

<script>
  function applyYourFilterBarFix() {
    const filterBar = document.querySelector("div.flex.items-center.gap-1.rounded-\\[50px\\].p-\\[3px\\]");
    if (filterBar) {
      filterBar.classList.add("ios-glass-filter-bar");
      const allTextElements = filterBar.querySelectorAll("p");
      allTextElements.forEach((p) => {
        p.style.setProperty("color", "#333", "important");
        p.style.setProperty("opacity", "0.9", "important");
      });
      const activeButton = filterBar.querySelector('div[class*="bg-white"], div[class*="bg-neutral-"]');
      if (activeButton) {
        const activeText = activeButton.querySelector("p");
        if (activeText) activeText.style.setProperty("opacity", "1", "important");
        if (activeText) activeText.style.setProperty("color", "#1a1a1a", "important");
      }
    }
  }
  setInterval(applyYourFilterBarFix, 250);
</script>

<!-- 防 F12 复制脚本 -->
<script>
  (function () {
    const isEditable = (el) => {
      if (!el) return false;
      return (
        el.isContentEditable ||
        /^(INPUT|TEXTAREA)$/i.test(el.tagName) ||
        !!el.closest?.('.allow-select, [contenteditable="true"]') ||
        !!el.closest?.(".CodeMirror, .monaco-editor")
      );
    };
    const stop = (e) => {
      e.preventDefault();
      e.stopPropagation();
      return false;
    };
    const blockIfNotEditable = (e) => {
      if (!isEditable(e.target)) stop(e);
    };
    window.addEventListener("contextmenu", blockIfNotEditable, true);
    window.addEventListener("copy", blockIfNotEditable, true);
    window.addEventListener("cut", blockIfNotEditable, true);
    window.addEventListener("paste", blockIfNotEditable, true);
    window.addEventListener("dragstart", blockIfNotEditable, true);
    window.addEventListener(
      "keydown",
      (e) => {
        const k = (e.key || "").toLowerCase();
        const mod = e.ctrlKey || e.metaKey;
        const blockCombos = mod && ["c", "x", "a", "s", "u", "p"].includes(k);
        const f12 = e.key === "F12";
        const devToolsCombos = (mod && e.shiftKey && (k === "i" || k === "j")) || f12;
        if (!isEditable(e.target) && (blockCombos || devToolsCombos)) stop(e);
      },
      true,
    );
    window.addEventListener(
      "copy",
      (e) => {
        if (isEditable(e.target)) return;
        e.preventDefault();
        const dt = e.clipboardData || window.clipboardData;
        if (dt?.setData) dt.setData("text/plain", "复制受限：仅供浏览。");
      },
      false,
    );
    const shadowCSS = `:host, * { -webkit-user-select: none !important; user-select: none !important; } input, textarea, [contenteditable="true"], .allow-select, .CodeMirror, .monaco-editor { -webkit-user-select: text !important; user-select: text !important; } ::selection { background: transparent !important; color: inherit !important; }`;
    const injectStyleToRoot = (root) => {
      try {
        if (!root || root.__antiCopyStyled__) return;
        const s = document.createElement("style");
        s.textContent = shadowCSS;
        root.appendChild(s);
        root.__antiCopyStyled__ = true;
      } catch (_) {}
    };
    const walkAndInject = (node) => {
      if (node.shadowRoot) injectStyleToRoot(node.shadowRoot);
      node.querySelectorAll?.("*").forEach((el) => {
        if (el.shadowRoot) injectStyleToRoot(el.shadowRoot);
      });
    };
    walkAndInject(document);
    const mo = new MutationObserver((muts) => {
      for (const m of muts) {
        m.addedNodes?.forEach((n) => {
          if (n.nodeType === 1) walkAndInject(n);
        });
      }
    });
    mo.observe(document.documentElement, { childList: true, subtree: true });
    document.addEventListener(
      "dragstart",
      (e) => {
        const t = e.target;
        if (t instanceof HTMLImageElement && !isEditable(t)) stop(e);
      },
      true,
    );
    document.addEventListener(
      "pointerdown",
      (e) => {
        const t = e.target;
        if (e.pointerType === "touch" && t instanceof HTMLElement && !isEditable(t)) {
          t.style.webkitTouchCallout = "none";
          t.style.webkitUserSelect = "none";
        }
      },
      true,
    );
    window.AntiCopy = {
      enable() {
        ["contextmenu", "copy", "cut", "paste", "dragstart"].forEach((type) => {
          window.addEventListener(type, blockIfNotEditable, true);
        });
      },
      disable() {
        ["contextmenu", "copy", "cut", "paste", "dragstart"].forEach((type) => {
          window.removeEventListener(type, blockIfNotEditable, true);
        });
      },
      whitelist(el) {
        const node = typeof el === "string" ? document.querySelector(el) : el;
        if (node) node.classList.add("allow-select");
      },
    };
  })();
</script>
