<style>
  @font-face {
    font-family: "Douyin Sans";
    src: url("https://fastly.jsdelivr.net/gh/bytedance/fonts@main/DouyinSans/DouyinSansBold.ttf") format("truetype");
    font-weight: bold;
    font-style: normal;
    font-display: swap;
  }

  /* 设置页面字体全局生效 强制覆盖默认无衬线字体 */
  * {
    font-family: "Douyin Sans", sans-serif !important;
  }

  h1,
  h2,
  h3,
  h4,
  h5 {
    font-family: "Douyin Sans", sans-serif !important;
    font-weight: bold;
  }

  /* 确保按钮 输入框等交互组件也使用该字体 */
  button,
  input,
  select,
  textarea {
    font-family: "Douyin Sans", sans-serif !important;
  }
</style>

<style>
  .dark .bg-card {
    font-family: "Roboto", "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #ffffff; /* 白色 高对比度 */
    position: relative; /* 设置元素为相对定位 */
    background-color: rgba(0, 0, 0, 0.3); /* 设置背景颜色为半透明的黑色 */
    backdrop-filter: blur(5px); /* 应用毛玻璃效果 模糊度为 5 像素 */
    border-radius: 15px; /* 设置边框圆角为 15 像素 */
    /* box-shadow: 0 6px 8px rgba(0, 0, 0, 0.1); 添加阴影效果 */
    /* overflow: hidden;  确保内容不会溢出容器 */
  }

  .dark .bg-card h1,
  .dark .bg-card h2,
  .dark .bg-card h3 {
    color: #ffffff; /* 保持标题的高对比度 */
  }

  .dark .bg-card p {
    color: #eeeeee; /* 段落文本稍微柔和一些 */
  }
</style>
