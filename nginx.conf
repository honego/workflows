# WebSocket Connection 头, 避免普通请求也强制 Connection: upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      "";
}

# 静态资源兜底缓存策略, 仅在上游没有 Cache-Control / Expires 时使用
map $uri $static_cache_control {
    default "";

    # 带构建指纹的静态资源, 兜底缓存 1 年
    "~*[-.][0-9a-z_-]{6,}\.(css|js|mjs|map|wasm|woff2?|ttf|otf|eot|svg|ico|cur|png|jpe?g|gif|webp|avif|apng|bmp|swf|mp3|mp4|m4a|aac|ogg|ogv|webm|flac|pdf)$" "public, max-age=31536000, immutable";

    # 普通静态资源, 兜底缓存 30 天
    "~*\.(css|js|mjs|map|wasm|woff2?|ttf|otf|eot|svg|ico|cur|png|jpe?g|gif|webp|avif|apng|bmp|swf|mp3|mp4|m4a|aac|ogg|ogv|webm|flac|pdf)$" "public, max-age=2592000";
}

server {
    listen       80;
    listen       [::]:80;
    server_name  uptime.honeok.com;
    return 301   https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    listen       443 quic;
    listen       [::]:443 quic;
    server_name  uptime.honeok.com;

    ssl_certificate      /etc/nginx/certs/honeok.com_fullchain.pem;
    ssl_certificate_key  /etc/nginx/certs/honeok.com_key.pem;

    client_max_body_size 25m;
    add_header Alt-Svc 'h3=":443"; ma=86400,h3-29=":443"; ma=86400';
    more_set_headers 'X-Request-Id: $request_id';

    # 阻止访问敏感文件
    access_by_lua_file /etc/nginx/lua/block.lua;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        # WebSocket 支持
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        # 客户端信息透传
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 上游有缓存头就遵循, 上游没缓存头才按静态资源后缀兜底
        header_filter_by_lua_block {
            local fallback = ngx.var.static_cache_control
            if not fallback or fallback == "" then
                return
            end

            local h = ngx.header
            local s = ngx.status

            if s ~= 200 and s ~= 206 then
                return
            end

            if h["Set-Cookie"] or h["Cache-Control"] or h["Expires"] then
                return
            end

            h["Cache-Control"] = fallback
        }
    }

    error_page 403 /403.html;
    location = /403.html {
        root /usr/local/openresty/nginx/html;
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/local/openresty/nginx/html;
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/local/openresty/nginx/html;
        internal;
    }
}
