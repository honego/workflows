# https://www.nodeseek.com/post-30779-1

upstream grpcserver {
    server 127.0.0.1:5555;
    keepalive 1024;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  tz.example.com;
    return 301   https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    listen       443 quic;
    listen       [::]:443 quic;
    server_name  tz.example.com;

    resolver 1.1.1.1 8.8.8.8 223.5.5.5 valid=300s;
    resolver_timeout 5s;

    ssl_certificate      /etc/nginx/certs/example.com_cert.pem;
    ssl_certificate_key  /etc/nginx/certs/example.com_key.pem;

    keepalive_time     24h;
    keepalive_timeout  120s;
    keepalive_requests 100000;

    # proxy_cache        off; # 关闭缓存
    # proxy_buffering    off;
    underscores_in_headers on; # 允许客户端请求头字段名中出现下划线
    client_max_body_size 5m;
    add_header Alt-Svc 'h3=":443"; ma=86400,h3-29=":443"; ma=86400';

    # 阻止访问敏感文件
    # access_by_lua_file /etc/nginx/lua/block.lua;
    location ~* ^/(\.(?!well-known)|/uploads/.*\.php|/files/.*\.php|(\.(env|git|gitignore|htaccess|hg|svn|bzr|editorconfig|npmrc|bashrc|bash_profile|bash_history|[^/]+)|composer\.(json|lock)|package\.json|yarn\.lock)$) {
        return         444;
        access_log     off;
        log_not_found  off;
    }

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Connection ""; # 清空Connection头防止客户端要求关闭连接
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ~ ^/(ws|terminal/.+|file/.+)$ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ^~ /proto.NezhaService/ {
        access_log             off;
        grpc_pass              grpc://grpcserver;
    	grpc_socket_keepalive  on;        # 与上游grpc服务器的tcp连接上启用内核级的心跳探测
    	grpc_send_timeout      300s;      # 向上游发送请求的超时时间
        grpc_read_timeout      300s;      # 等待上游响应的超时时间
    }

    error_page 403 /403.html;
    location = /403.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
