upstream grpcserver {
    server 127.0.0.1:8008;
    keepalive 1024;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  tz.example.com;
    return 301   https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    listen       443 quic;
    listen       [::]:443 quic;
    server_name  tz.example.com;

    resolver 1.1.1.1 8.8.8.8 223.5.5.5 valid=300s;
    resolver_timeout 5s;

    ssl_certificate      /etc/nginx/certs/example.com_cert.pem;
    ssl_certificate_key  /etc/nginx/certs/example.com_key.pem;

    # keepalive_time     24h;
    # keepalive_timeout  120s;
    # keepalive_requests 100000;

    underscores_in_headers on; # 允许客户端请求头字段名中出现下划线
    client_max_body_size 5m;
    add_header Alt-Svc 'h3=":443"; ma=86400,h3-29=":443"; ma=86400';

    # 阻止访问敏感文件
    # access_by_lua_file /etc/nginx/lua/block.lua;
    location ~* ^/(\.(?!well-known)|/uploads/.*\.php|/files/.*\.php|(\.(env|git|gitignore|htaccess|hg|svn|bzr|editorconfig|npmrc|bashrc|bash_profile|bash_history|[^/]+)|composer\.(json|lock)|package\.json|yarn\.lock)$) {
        return         444;
        access_log     off;
        log_not_found  off;
    }

    # Web
    location / {
        proxy_pass         http://127.0.0.1:8008;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";                    # 清空Connection头防止客户端要求关闭连接
        proxy_set_header   Host $host;
        proxy_set_header   nz-realip $http_cf_connecting_ip; # 替换为CDN提供的私有header 此处默认为CloudFlare
        # proxy_set_header nz-realip $remote_addr;             # 如果使用nginx作为最外层就把上面一行注释掉 启用此行
        # proxy_set_header X-Forwarded-Proto $scheme;          # 如果使用nginx作为最外层, 就启用此行避免无法正确读取访问的协议
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Websocket
    location ~* ^/api/v1/ws/(server|terminal|file)(.*)$ {
        proxy_pass         http://127.0.0.1:8008;
        proxy_http_version 1.1;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Origin https://$host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   nz-realip $http_cf_connecting_ip; # 替换为CDN提供的私有header 此处默认为CloudFlare
        # proxy_set_header nz-realip $remote_addr;             # 如果使用nginx作为最外层就把上面一行注释掉 启用此行
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # gRPC
    location ^~ /proto.NezhaService/ {
        access_log             off;
        grpc_set_header        Host $host;
        proxy_set_header       nz-realip $http_CF_Connecting_IP; # 替换为CDN提供的私有header 此处默认为CloudFlare
        # grpc_set_header        nz-realip $remote_addr;           # 如果使用nginx作为最外层就把上面一行注释掉 启用此行
    	grpc_socket_keepalive  on;                               # 与上游grpc服务器的tcp连接上启用内核级的心跳探测
    	grpc_send_timeout      600s;  # 向上游发送请求的超时时间
        grpc_read_timeout      600s;  # 等待上游响应的超时时间
        client_max_body_size   10m;
        grpc_buffer_size       4m;
        grpc_pass              grpc://grpcserver;
    }

    error_page 403 /403.html;
    location = /403.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
