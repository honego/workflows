# /etc/nginx/nginx.conf

load_module modules/ngx_http_acme_module.so;
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_headers_more_filter_module.so;
load_module modules/ngx_http_zstd_filter_module.so;
load_module modules/ngx_http_zstd_static_module.so;
load_module modules/ngx_http_geoip2_module.so;
load_module modules/ngx_stream_geoip2_module.so;

user  nginx;
worker_processes  auto;

pcre_jit on;
worker_rlimit_nofile  65535;
thread_pool  default threads=16 max_queue=65536;

error_log  /var/log/nginx/error.log error;
pid        /run/nginx.pid;

events {
    use  epoll;
    multi_accept  on;
    worker_connections  2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log main buffer=512k flush=10s;

    aio off;
    aio_write  off;
    auth_delay  0s;
    chunked_transfer_encoding  on;
    client_body_buffer_size  256k;
    client_body_timeout  30s;
    client_header_buffer_size  4k;
    client_header_timeout  30s;
    client_max_body_size  64m;

    directio  off;
    directio_alignment  512;
    disable_symlinks  off;

    etag  on;

    ignore_invalid_headers  on;
    keepalive_disable  msie6;
    keepalive_min_timeout 0;
    keepalive_requests  1000;
    keepalive_time  1h;
    keepalive_timeout  75s;
    large_client_header_buffers  4 8k;

    limit_rate  0;
    limit_rate_after  0;

    lingering_close  on;
    lingering_time  30s;
    lingering_timeout  5s;

    log_not_found  on;
    log_subrequest  off;
    max_headers  1000;
    msie_padding  off;
    msie_refresh  off;

    open_file_cache max=2000 inactive=30s;
    open_file_cache_errors  on;
    open_file_cache_min_uses  2;
    open_file_cache_valid  60s;

    output_buffers  2 32k;
    reset_timedout_connection  on;

    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
    resolver_timeout 5s;

    send_timeout  60s;
    sendfile  on;
    sendfile_max_chunk  2m;

    # server_names_hash_bucket_size  64;
    server_names_hash_max_size  512;
    server_tokens  off;

    more_clear_headers 'Server' 'X-Powered-By' 'X-AspNet-Version' 'X-AspNetMvc-Version' 'X-Generator';
    # more_set_headers 'Server: honeok';

    subrequest_output_buffer_size  8k;
    tcp_nodelay  on;
    tcp_nopush  on;
    types_hash_bucket_size  64;
    types_hash_max_size  1024;
    underscores_in_headers  off;
    variables_hash_bucket_size  64;
    variables_hash_max_size  1024;

    # zstd  on;
    # zstd_comp_level  3;
    # zstd_min_length  1k;
    # zstd_buffers  32 4k;
    # zstd_static  on;
    # zstd_types
    #     text/plain text/css text/javascript text/xml
    #     application/javascript application/json application/xml
    #     application/rss+xml application/atom+xml
    #     application/vnd.api+json application/xhtml+xml application/wasm
    #     image/svg+xml;

    # brotli_static  on;
    # brotli  on;
    # brotli_comp_level  6;
    # brotli_window  512k;
    # brotli_min_length  1k;
    # brotli_types
    #     text/plain text/css text/javascript text/xml
    #     application/javascript application/json application/xml
    #     application/rss+xml application/atom+xml
    #     application/vnd.api+json application/xhtml+xml application/wasm
    #     image/svg+xml;

    gzip  on;
    gzip_static  on;
    gzip_buffers  32 4k;
    gzip_comp_level  4;
    gzip_disable  "MSIE [1-6]\.|Netscape/4";
    gzip_http_version  1.1;
    gzip_min_length  1k;
    gzip_proxied  expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        application/vnd.api+json application/xhtml+xml application/wasm
        image/svg+xml;
    gzip_vary  on;

    http3  on;
    http3_hq  off;
    http3_max_concurrent_streams  256;
    http3_stream_buffer_size  128k;
    quic_active_connection_id_limit  4;
    quic_gso  on;
    quic_retry  on;

    http2  on;
    http2_body_preread_size  128k;
    http2_chunk_size  16k;
    http2_max_concurrent_streams  256;
    http2_recv_buffer_size  256k;

    ssl_buffer_size  8k;
    ssl_certificate_cache  max=2000 inactive=5m valid=20m;
    ssl_certificate_compression  on;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;
    ssl_ecdh_curve  auto;
    ssl_prefer_server_ciphers  on;
    ssl_protocols  TLSv1.2 TLSv1.3;
    ssl_session_cache  shared:SSL:10m;
    ssl_session_tickets  on;
    ssl_session_timeout  1h;
    ssl_stapling  off;
    ssl_stapling_verify  off;
    ssl_verify_client  off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), browsing-topics=()";

    fastcgi_buffer_size  32k;
    fastcgi_buffering  on;
    fastcgi_buffers  8 16k;
    fastcgi_busy_buffers_size  32k;
    # fastcgi_cache  fastcgi;
    fastcgi_cache_background_update  on;
    fastcgi_cache_bypass  $http_cookie $http_authorization $http_pragma $http_cache_control;
    fastcgi_no_cache $http_cookie $http_authorization $http_pragma $http_cache_control;
    fastcgi_cache_key  "$scheme$request_method$host$request_uri";
    fastcgi_cache_lock  on;
    fastcgi_cache_lock_age  5s;
    fastcgi_cache_lock_timeout  5s;
    fastcgi_cache_methods  GET HEAD;
    fastcgi_cache_min_uses  2;
    fastcgi_cache_path /var/cache/nginx/fastcgi_cache levels=1:2 keys_zone=fastcgi:20m max_size=1g inactive=30m use_temp_path=off;
    fastcgi_cache_revalidate  on;

    fastcgi_cache_valid  200 302  60m;
    fastcgi_cache_valid  301      1d;
    fastcgi_cache_valid  404      1m;
    fastcgi_cache_valid  500 502 503 504 0s;
    # fastcgi_cache_valid  any      1m;

    fastcgi_connect_timeout  30s;
    fastcgi_hide_header  X-Powered-By;
    fastcgi_intercept_errors  on;
    fastcgi_keep_conn  on;
    fastcgi_read_timeout  60s;
    fastcgi_send_timeout  60s;

    proxy_buffer_size  16k;
    proxy_buffering  on;
    proxy_buffers  8 16k;
    proxy_busy_buffers_size  32k;
    # proxy_cache  proxy_cache;
    proxy_cache_background_update  on;
    proxy_cache_bypass  $arg_nocache $http_authorization $http_pragma;
    proxy_no_cache  $arg_nocache $http_authorization $http_pragma;
    proxy_cache_key  "$scheme$host$uri$is_args$args";
    proxy_cache_lock  on;
    proxy_cache_lock_age  5s;
    proxy_cache_lock_timeout  5s;
    proxy_cache_methods  GET HEAD;
    proxy_cache_min_uses  1;
    proxy_cache_path /var/cache/nginx/proxy_cache levels=1:2 keys_zone=proxy:20m max_size=1g inactive=1h use_temp_path=off;
    proxy_cache_revalidate  on;

    proxy_cache_valid  200 302  120m;
    proxy_cache_valid  301      1d;
    proxy_cache_valid  404      10m;
    proxy_cache_valid  500 502 503 504 0s;
    # proxy_cache_valid  any      1m;

    proxy_connect_timeout  30s;
    proxy_headers_hash_bucket_size  64;
    proxy_headers_hash_max_size  512;
    proxy_hide_header  X-Powered-By;
    proxy_intercept_errors  on;
    proxy_limit_rate  0;
    proxy_read_timeout  30s;
    proxy_send_timeout  30s;
    proxy_socket_keepalive  on;

    include /etc/nginx/conf.d/*.conf;
}
