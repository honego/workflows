# WebSocket Connection 头, 避免普通请求也强制 Connection: upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      "";
}

# 静态资源兜底缓存策略, 仅在上游没有 Cache-Control / Expires 时使用
map $uri $static_cache_control {
    default "";

    # 框架明确的不可变构建目录, 路径本身由构建系统管理
    # Next.js: /_next/static/
    # SvelteKit: /_app/immutable/
    "~*^/(?:_next/static|_app/immutable)/.+\.(?:(?:css|js|mjs|cjs)(?:\.map)?|map|wasm|woff2?|ttf|otf|eot|svg|ico|cur|png|jpe?g|gif|webp|avif|apng|bmp|swf|mp3|mp4|m4a|aac|oga|ogg|ogv|opus|webm|flac|pdf)$" "public, max-age=31536000, immutable";

    # 主流前端构建目录 + base64url/hex 指纹文件
    # Vite/Rollup/Astro/Remix: /assets/index-BmbyAd75.css
    # Nuxt: /_nuxt/entry.xxxxx.js
    # CRA/Webpack/Vue CLI: /static/js/main.xxxxx.js /static/css/main.xxxxx.css /static/media/logo.xxxxx.svg
    "~*^/(?:_nuxt|assets|build/assets|dist/assets|static/(?:js|css|media|assets))/.+[-._~][A-Za-z0-9_-]{8,128}\.(?:(?:css|js|mjs|cjs)(?:\.map)?|map|wasm|woff2?|ttf|otf|eot|svg|ico|cur|png|jpe?g|gif|webp|avif|apng|bmp|swf|mp3|mp4|m4a|aac|oga|ogg|ogv|opus|webm|flac|pdf)$" "public, max-age=31536000, immutable";

    # 全局十六进制指纹资源
    # 兼容 main.8f3a1c2d.js / app-8f3a1c2d.css / chunk_8f3a1c2d.mjs
    "~*[-._~][0-9a-f]{8,128}\.(?:(?:css|js|mjs|cjs)(?:\.map)?|map|wasm|woff2?|ttf|otf|eot|svg|ico|cur|png|jpe?g|gif|webp|avif|apng|bmp|swf|mp3|mp4|m4a|aac|oga|ogg|ogv|opus|webm|flac|pdf)$" "public, max-age=31536000, immutable";

    # 普通静态资源, 未确认构建指纹, 兜底缓存 30 天
    "~*\.(?:(?:css|js|mjs|cjs)(?:\.map)?|map|wasm|woff2?|ttf|otf|eot|svg|ico|cur|png|jpe?g|gif|webp|avif|apng|bmp|swf|mp3|mp4|m4a|aac|oga|ogg|ogv|opus|webm|flac|pdf)$" "public, max-age=2592000";
}
