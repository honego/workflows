# https://nezha.wiki/guide/q3.html

upstream grpcserver {
    server 127.0.0.1:8008;
    keepalive 1024;
}

server {
    listen       80;
    listen       [::]:80;
    server_name  tz.honeok.com;
    return 301   https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    listen       443 quic;
    listen       [::]:443 quic;
    server_name  tz.honeok.com;

    ssl_certificate      /etc/nginx/certs/honeok.com_fullchain.pem;
    ssl_certificate_key  /etc/nginx/certs/honeok.com_key.pem;

    keepalive_time     24h;
    keepalive_timeout  120s;
    keepalive_requests 100000;

    underscores_in_headers on; # 允许客户端请求头字段名中出现下划线
    client_max_body_size 10m;

    add_header Alt-Svc 'h3=":443"; ma=86400,h3-29=":443"; ma=86400';

    # more_set_headers 'X-Client-IP: $remote_addr';
    # more_set_headers 'X-Request-Id: $request_id';
    # more_set_headers 'X-Request-Time: $request_time';

    # 访问控制
    access_by_lua_file /etc/nginx/lua/access/bootstrap.lua;

    # Web
    location / {
        proxy_pass         http://127.0.0.1:8008;
        proxy_http_version 1.1;
        proxy_set_header   Connection ""; # 清空 Connection 头防止客户端要求关闭连接
        # 客户端信息透传
        proxy_set_header   Host $host;
        # proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   nz-realip $http_cf_connecting_ip; # 替换为 CDN 提供的私有 header 此处默认为 CloudFlare
        # proxy_set_header   nz-realip $remote_addr; # 如果使用 nginx 作为最外层, 注释上一行并启用此行
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        early_hints        $early_hints; # HTTP 103 Early Hints: 透传上游返回的 103, 让浏览器提前预加载资源

        # 启用 sub_filter
        proxy_set_header   Accept-Encoding "";  # 禁用 gzip 压缩 确保能替换响应体
        sub_filter '</head>' '</head><script defer src="https://umami.honeok.com/script.js" data-website-id="8585d0f0-e2aa-4507-b95d-3ceec8b1f017"></script>';
        sub_filter_once    on;

        # 上游有缓存头就遵循, 上游没缓存头才按静态资源后缀兜底
        header_filter_by_lua_file /etc/nginx/lua/header_filter/static_cache_control.lua;
    }

    # Websocket
    location ~* ^/api/v1/ws/(server|terminal|file)(.*)$ {
        proxy_pass         http://127.0.0.1:8008;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Origin https://$host;
        proxy_set_header   Host $host;
        proxy_set_header   nz-realip $http_cf_connecting_ip; # 替换为 CDN 提供的私有 header 此处默认为 CloudFlare
        # proxy_set_header   nz-realip $remote_addr; # 如果使用 nginx 作为最外层, 注释上一行并启用此行
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # gRPC
    location ^~ /proto.NezhaService/ {
        access_log             off;
        grpc_set_header        Host $host;
        grpc_set_header        nz-realip $http_cf_connecting_ip; # 替换为 CDN 提供的私有 header 此处默认为 CloudFlare
        # grpc_set_header        nz-realip $remote_addr; # 如果使用 nginx 作为最外层, 注释上一行并启用此行
    	grpc_socket_keepalive  on;   # 与上游 grpc 服务器的 tcp 连接上启用内核级的心跳探测
    	grpc_send_timeout      600s; # 向上游发送请求的超时时间
        grpc_read_timeout      600s; # 等待上游响应的超时时间
        client_max_body_size   10m;
        grpc_buffer_size       4m;
        grpc_pass              grpc://grpcserver;
    }

    error_page 403 /403.html;
    location = /403.html {
        root /usr/local/openresty/nginx/html;
        internal;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /usr/local/openresty/nginx/html;
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/local/openresty/nginx/html;
        internal;
    }
}
