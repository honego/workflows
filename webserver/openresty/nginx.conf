# /usr/local/openresty/nginx/conf/nginx.conf

load_module modules/ngx_http_acme_module.so;
load_module modules/ngx_http_brotli_filter_module.so; # 用于动态压缩响应
load_module modules/ngx_http_brotli_static_module.so; # 用于提供预压缩文件
# load_module modules/ngx_http_headers_more_filter_module.so; # OpenResty已内置 headers-more 模块，无需加载
load_module modules/ngx_http_zstd_filter_module.so;
load_module modules/ngx_http_zstd_static_module.so;

user  nginx;
worker_processes  auto; # 设置工作进程数量，通常为CPU核心数

pcre_jit on; # 允许使用JIT来加速正则表达式的处理

# 设置原则: 需与worker_connections配合，通常设置为worker_connections的两倍（反向代理场景下，每连接可能需要两个文件描述符：一个用于客户端，一个用于上游服务器）
worker_rlimit_nofile  65535; # 指定每个工作进程可打开的最大文件描述符数量

# 启动一个默认线程池，将阻塞任务（如磁盘 I/O）交给线程池，释放主线程处理更多请求
# 需启用 aio on;
# threads：线程数，建议设为CPU核心数的2-4倍
# max_queue: 任务队列上限，防止任务堆积
thread_pool  default threads=16 max_queue=65536; # 分配16个线程来处理请求，并且这个线程池的队列最大长度为65536。可以处理更多的并发请求，减少请求等待时间提高系统的吞吐量

# 使用eBPF启用QUIC数据包路由，启用后可支持QUIC连接迁移
# 该指令仅支持Linux 5.7+
# quic_bpf  on;

error_log  /usr/local/openresty/nginx/logs/error.log error;
pid        /run/nginx.pid;

events {
    use  epoll; # 使用epoll作为事件模型，默认使用epoll作为事件驱动模型，无需显式配置use epoll即可生效

    # 启用后工作进程一次处理多个新连接，提升高并发性能，适用高并发场景
    multi_accept  on; # 控制工作进程是否一次性接受队列中所有新连接

    # 设置每个工作进程可处理的最大并发连接数 默认值512
    # 根据内存和worker_rlimit_nofile调整，常见1024-65536
    worker_connections  2048;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;
    charset       utf-8; # 响应内容的字符编码

    # 引入 Lua 模块
    lua_package_path "/etc/nginx/lua/?.lua;/usr/local/openresty/lualib/?.lua;;"; # Lua 模块
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;"; # C 模块

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # buffer=512k 设置512KB内存缓冲区，减少磁盘I/O
    # 缓冲数据每10秒写入磁盘，平衡性能与数据安全
    access_log  /usr/local/openresty/nginx/logs/access.log main buffer=512k flush=10s; # 把访问日志使用main格式缓存在内存中

    # https://nginx.org/en/docs/http/ngx_http_core_module.html
    # aio  on; # 启用异步I/O，采用线程池，不影响sendfile等机制，在全局配置中应该保持关闭，以充分利用系统页面缓存
    # aio_write  on; # 如果启用了aio，则指定是否使用aio写入文件，目前此功能仅在使用代理服务器时有效， aio threads并且仅限于将从代理服务器接收的数据写入临时文件
    chunked_transfer_encoding  on; # 开启HTTP/1.1协议中的分块传输编码，默认开启
    # https://blog.cloudflare.com/delivering-http-2-upload-speed-improvements
    client_body_buffer_size  256k; # 用于读取客户端请求主体的缓冲区大小，如果请求主体大于缓冲区，则将整个主体或仅其部分写入临时文件，专门用于存放客户端POST请求的请求体 (Request Body)，例如用户提交的表单数据、上传的小文件等
    # https://www.plesk.com/blog/various/nginx-performance-tuning-tips
    # 指在两次连续的读操作（read operation）之间的最长等待时间。如果在这段时间内，没有收到任何新的请求体数据，就会关闭连接。
    client_body_timeout  15s; # 设置服务器等待客户端发送请求体 (Request Body) 的超时时间，返回408 Request Timeout默认值60s
    client_header_buffer_size  1k; # 内存缓冲区大小，用来存放客户端（浏览器）请求的请求头 (Request Headers)
    # 客户端在指定时间内没有把所有的请求头信息（如 Host, User-Agent等）全部发送过来，服务器将会关闭连接，并返回408Request Timeout错误
    # 这个指令对于防范"慢速连接攻击"（如 Slowloris 攻击）至关重要，一个正常的客户端应该在建立连接后瞬间就把请求头发送完毕
    client_header_timeout  15s; # 定义读取客户端请求标头的超时时间，如果客户端未在此时间内传输整个标头，则请求将终止并返回408 (Request Time-out)错误

    # 单服务器环境建议: etag on;在只有一台服务器的情况下，ETag能与Last-Modified头互补，提供更精确的缓存验证机制，有效节省带宽
    # 多服务器集群：默认ETag含inode号会导致缓存失效，建议关闭
    etag  on; # 为静态资源自动生成ETag (Entity Tag) HTTP响应头，启用ETag头用于标识资源的版本，帮助浏览器进行缓存管理

    keepalive_disable  msie6; # 禁用与行为异常的浏览器的保持连接
    keepalive_requests  1000; # 设置每个长连接可处理的最大请求数，限制单一长连接的请求次数，控制资源占用
    keepalive_time  15m; # 一个长连接（keep-alive connection）的"总寿命"上限
    keepalive_timeout  30s; # 设置与客户端长连接的空闲超时时间，控制客户端与服务器的长连接保持时间，节省连接建立开销 默认值75s

    large_client_header_buffers  4 16k; # 设置较大的客户端请求头缓冲区数量和大小，允许更大的请求头(最大64k)，以支持复杂认证令牌(Token)。

    # 推荐用于子配置文件限制
    # limit_rate 50m; # 设置带宽限制
    # limit_rate_after 100m; # 在传输100m后开始限制带宽

    lingering_close  on; # 延迟关闭，nginx在完全关闭连接之前等待并处理来自客户端的额外数据，但前提是启发式方法表明客户端可能正在发送更多数据，默认开启
    lingering_time  15s; # 在关闭连接前，最多会等待客户端额外发送数据（例如请求体尾部）多少秒
    lingering_timeout  5s; # 该指令设置了在"延迟关闭 (lingering_close)"状态中，服务器等待下一次客户端数据到达的最长超时时间

    # 用于开启一个文件元数据缓存，对于任何需要处理大量静态文件请求的服务器需开启此项
    open_file_cache max=20000 inactive=30s; # 设置缓存中最多可以存放20000个条目，如果缓存满了会根据LRU（最近最少使用）原则淘汰旧的条目，如果一个缓存条目在30秒内没有被访问，则自动将其从缓存中移除
    open_file_cache_errors  on; # 缓存404 403这类错误信息，有效避免对一个不存在的文件（如网站根目录下缺失的favicon.ico）反复查询磁盘
    open_file_cache_min_uses  2; # 入口过滤器，设置一个文件至少要被访问2次，它的文件句柄才会被缓存，确保缓存里都是热门资源
    open_file_cache_valid  60s; # 设置缓存的元信息的有效期为60秒

    output_buffers  2 32k; # 用于存放即将发送给客户端的响应数据的内存缓冲区
    reset_timedout_connection  on; # 客户端连接因为超时（keepalive_timeout或send_timeout到期）而被关闭时，会立刻重置连接，而不是等待它自动关闭或继续保持连接，向客户端发送一个TCP RST包

    # 常用于 ACME、OCSP Stapling、变量 proxy_pass、动态 upstream resolve、Docker 容器服务名、njs/lua 外部请求等场景
    # valid=30s 表示覆盖 DNS 结果缓存时间为 30 秒; ipv6=off 表示不查询 AAAA 记录, 建议使用可信 DNS
    resolver 8.8.8.8 1.1.1.1 valid=30s ipv6=off;
    # resolver 223.5.5.5 119.29.29.29 valid=30s ipv6=off;

    # 用于设置 DNS 解析超时时间, 默认 30s
    # 表示 Nginx 向 resolver 发起 DNS 查询后最多等待多久, 超时则认为解析失败
    # 普通公网 DNS 可设为 5s~10s; 内网/Docker DNS 通常也不建议太长, 避免请求长时间卡在解析阶段
    resolver_timeout 5s;

    send_timeout  15s; # 设置了服务器向客户端发送响应数据的超时时间，如果在此时间内未发送数据，连接将被关闭 默认值60s
    sendfile  on; # 使用sendfile系统调用，优化静态文件传输，直接从磁盘到网络传输文件，减少CPU和内存开销，减少上下文切换
    sendfile_max_chunk  2m; # 限制单次sendfile，系统调用可以发送的最大数据量

    # server_names_hash_bucket_size  64; # 设置服务器名称哈希表中每个"桶"（Bucket）的大小，默认值取决于处理器缓存行的大小
    server_names_hash_max_size  512; # 用于设置存放服务器名称（server_name）哈希表的最大尺寸，默认值512

    server_tokens  off; # 控制HTTP响应头中是否显示版本信息

    # https://github.com/openresty/headers-more-nginx-module
    more_clear_headers 'Server' 'X-Powered-By' 'X-AspNet-Version' 'X-Request-ID' 'X-Runtime' 'X-Cache' 'Via'; # 删除响应头
    # more_set_headers 'Server: honeok'; # 自定义Server响应头

    subrequest_output_buffer_size  16k; # 存储子请求响应主体的缓冲区大小
    tcp_nodelay  on; # 启用TCP_NODELAY选项，优化数据发送实时性，禁用Nagle算法，立即发送小数据包，降低延迟
    tcp_nopush  on; # 启用TCP_CORK选项，优化数据包发送效率，延迟发送数据包，合并小数据包，减少网络开销
    types_hash_bucket_size  64; # 设置MIME类型哈希表中每个"桶"（Bucket）的大小，默认值通常是32,64,或128，与CPU缓存行大小对齐 getconf LEVEL1_DCACHE_LINESIZE
    types_hash_max_size  2048; # 存放MIME类型哈希表的最大尺寸
    variables_hash_bucket_size  64; # 设置变量哈希表的桶大小
    # 这个哈希表主要由map指令使用，当使用map指令来定义大量的键值映射规则时（例如根据User-Agent映射到不同的后端服务），将这些规则存入一个变量哈希表中，以便进行高效查找
    variables_hash_max_size  1024; # 设置了存放变量哈希表 (variables hash table) 的最大尺寸

    zstd  on; # 启用Zstandard压缩算法
    zstd_static  on; # 预压缩静态文件，减少实时压缩开销，适合静态资源
    zstd_comp_level  4; # Zstandard压缩级别，范围1（快）到22（高压缩） 建议3-5，平衡压缩速度与比率，适合高流量场景
    zstd_buffers  32 4k; # Zstandard压缩的缓冲区数量和大小，用于处理压缩数据，增加number和size（如 16 16k）可提升高并发下压缩性能，但占用更多内存 getconf PAGE_SIZE 获取默认值 32 4k总共128KB
    zstd_min_length  256; # Zstandard压缩的最小响应数据长度（字节），通用推荐值: zstd_min_length 1024;  太低（如 0）可能浪费CPU压缩小数据；太高可能错过压缩机会
    zstd_types
        text/css text/xml text/plain text/javascript
        application/json application/javascript application/x-javascript application/xml
        application/atom+xml application/rss+xml application/vnd.api+json application/xhtml+xml
        application/vnd.ms-fontobject application/x-font-opentype application/x-font-truetype
        application/x-font-ttf
        font/eot font/opentype font/otf font/truetype
        image/svg+xml image/vnd.microsoft.icon image/x-icon image/x-win-bitmap;

    # ## https://github.com/google/ngx_brotli
    # # https://gablaxian.com/blog/brotli-compression
    # brotli_static  on; # 启用预压缩 .br 静态文件发送, 默认 off
    # brotli  on; # 启用或禁用响应的即时压缩，默认 off
    # # brotli_buffers  32 4k; # 参数已弃用
    # brotli_comp_level  6; # 设置 Brotli 动态压缩等级, 可接受的值范围为 0 ~ 11, 数值越高压缩率越好但 CPU 开销越大
    # brotli_window  512k; # 设置了Brotli压缩算法的 "滑动窗口" 大小, 可接受的值为 1k、2k、4k、8k、16k、32k、64k、128k、256k、512k、1m、2m、4m、8m 和 16m
    # brotli_min_length  1k; # 设置启用 Brotli 压缩的最小响应大小, 其长度仅由 "Content-Length" 响应头字段决定, 默认值为 20
    # brotli_types
    #     text/plain text/css text/javascript text/xml
    #     application/javascript application/json application/xml
    #     application/rss+xml application/atom+xml
    #     application/vnd.api+json application/xhtml+xml application/wasm
    #     image/svg+xml;

    ## https://nginx.org/en/docs/http/ngx_http_gzip_module.html
    gzip  on; # 开启Gzip压缩, 减小传输内容大小提高页面加载速度

    # https://en.angie.software/angie/docs/configuration/modules/http/http_gzip_static
    # 用于启用预压缩 .gz 静态文件发送, 默认 off
    # 开启后如果磁盘上存在同名 .gz 文件, 且客户端支持 gzip, Nginx 会直接发送 .gz 文件, 避免运行时动态压缩, 降低 CPU 开销
    # 适合前端构建产物、静态站、文档站、镜像站目录页等可提前压缩的静态资源
    # on 表示仅在客户端支持 gzip 时才发送 .gz, always 表示不检查客户端是否支持 gzip, 强制使用 .gz 文件
    # 普通生产环境建议使用 on, 不建议使用 always, 除非磁盘上只有 .gz 文件或配合 gunzip 模块给不支持 gzip 的客户端解压
    # 原始文件和 .gz 文件建议保持相同修改时间, 避免 Last-Modified/缓存校验行为不一致
    gzip_static  on;

    gzip_buffers  32 4k; # 设置用于Gzip压缩的缓冲区数量和大小 getconf PAGE_SIZE 获取默认值 32 4k总共128KB
    gzip_comp_level  4; # 设置响应的 gzip 压缩级别 (范围为1-9, 越高压缩率越高但占用CPU更多)
    gzip_disable  "MSIE [1-6]\.|Netscape/4"; # 历史遗留的产物, 禁用对早期 IE 浏览器和 Netscape 4 浏览器的 Gzip 压缩
    gzip_http_version  1.1; # 设置压缩响应所需的最低 HTTP 请求版本

    # 设置将被压缩的响应的最小长度, 该长度仅由响应头中的 "Content-Length" 字段确定, 默认 20
    # 该大小只根据响应头中的 Content-Length 判断; 如果响应没有 Content-Length, 可能不会按该值判断
    # 太小的响应压缩收益很低, 反而会增加 CPU 开销和 gzip 头部开销
    # 普通网站/API/反代建议设置为 1k 或 2k, 只压缩有明显收益的文本响应
    gzip_min_length  1k;

    # 根据请求和响应, 启用或禁用代理请求响应的 gzip 压缩, 请求是否为代理请求由请求头中是否存在 "Via" 字段决定, 该指令接受多个参数, 默认值为 off
    # 这里的代理请求是指客户端请求经过 CDN/代理/网关并带有 Via 头, 不是单纯指 Nginx proxy_pass 到上游
    # off 表示禁用所有代理请求压缩, any 表示对所有带 Via 的代理请求启用压缩
    # expired/no-cache/no-store/private/auth 表示当响应不可缓存、私有, 或请求带 Authorization 时允许 gzip, 属于较保守的传统写法
    # 如果存在包含敏感 token、隐私数据的动态页面, 需注意压缩侧信道风险, 不建议无脑使用 any
    gzip_proxied  expired no-cache no-store private auth;

    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        application/vnd.api+json application/xhtml+xml application/wasm
        image/svg+xml;

    # 用于在启用 gzip/gzip_static/gunzip 时添加 Vary: Accept-Encoding 响应头, 默认 off
    # 该响应头告诉浏览器、CDN、代理缓存: 同一 URL 会根据客户端 Accept-Encoding 返回压缩或未压缩版本
    # 开启后下游缓存应按 Accept-Encoding 区分缓存键, 避免把 gzip 版本错误返回给不支持 gzip 的客户端
    # 普通网站/API/反代/CDN 场景建议开启
    gzip_vary  on; # 添加 Vary: Accept-Encoding, 让 CDN/代理按压缩能力区分缓存版本, 避免压缩/未压缩响应混用

    ## https://nginx.org/en/docs/http/ngx_http_v3_module.html
    http3  on;

    # 用于启用 QUIC 互操作性测试中的 HTTP/0.9 协议协商, 默认 off
    # 该参数主要用于 HTTP/3/QUIC interop 测试或调试场景, 不是正常网站提供 HTTP/3 所必需
    # 普通生产环境、反代、网站、API、下载站都不应开启, 保持 off 即可
    http3_hq  off;

    # 用于设置单个 HTTP/3/QUIC 连接内允许并发的最大请求 stream 数量, 默认 128
    # HTTP/3 基于 QUIC, 一个连接中可以同时承载多个请求/响应, 每个请求/响应对应一个 stream
    # 数值越大, 单连接可并发处理的请求越多, 有利于资源较多的页面或高并发复用连接, 数值过大可能导致单个连接占用更多内存、请求处理资源和上游连接资源
    # 数值过小可能限制浏览器并发加载资源, 影响 HTTP/3 多路复用效果
    # 普通网站/API/反代保持默认 128 通常足够; 如明确存在单连接 stream 并发瓶颈, 可测试 256
    http3_max_concurrent_streams  256; # 提高单个 HTTP/3/QUIC 连接内可并发处理的请求 stream 数量

    # http3_stream_buffer_size 用于设置 QUIC stream 读写缓冲区大小, 默认 64k
    # 该参数影响 HTTP/3 请求/响应在单个 QUIC stream 上读写数据时的缓冲能力
    # 数值过小可能在高带宽、高 RTT、大响应或大上传场景下增加读写调度开销, 影响吞吐
    # 数值过大则会增加每个活跃 QUIC stream 的内存占用, 高并发 HTTP/3 连接下需要注意内存压力
    # 普通网站/API/反代通常保持默认 64k 即可, 大文件下载、对象存储上传、WebDAV、测速等场景可测试 128k
    http3_stream_buffer_size  128k; # 放大 QUIC stream 读写缓冲区, 用于改善 HTTP/3 大上传/大响应吞吐, 需结合并发和内存测试

    # 用于设置 QUIC active_connection_id_limit 传输参数, 默认 2
    # 该参数表示服务端最多保存多少个客户端 Connection ID, 主要影响 QUIC 连接迁移和网络路径变化场景
    # Connection ID 可让 QUIC 在客户端 IP/端口变化时继续识别同一连接, 例如 Wi-Fi/蜂窝网络切换、NAT 端口变化等
    # 数值越大, 对移动端、弱网、频繁网络切换、多路径场景更宽松, 但每个 QUIC 连接需要维护更多状态
    # 普通网站/API/反代通常保持默认 2 即可, 移动端占比高或希望增强 QUIC 连接迁移能力时可测试 4/8
    quic_active_connection_id_limit  4; # 客户端允许服务器同时使用多少个connection ID，允许客户端在网络切换时（如 Wi-Fi → 5G）保持会话不中断

    quic_gso  on; # 启用分段卸载功能，以优化的批量模式发送数据, 优化发送仅在支持 UDP_SEGMENT 的 Linux 系统上受支持
    quic_retry  on; # 启用 QUIC 地址验证, 防止伪造攻击，启用后服务器对新连接发起"Retry"包，验证客户端地址真实性

    ## https://nginx.org/en/docs/http/ngx_http_v2_module.html
    # https://blog.cloudflare.com/delivering-http-2-upload-speed-improvements
    http2  on;

    # 用于设置 HTTP/2 每个请求的请求体预读缓冲区大小, 默认 64k
    # 该参数影响 HTTP/2 上传/POST/PUT 请求体, 不是响应体缓存, 也不是最大上传大小
    # 在 HTTP/2 中, 请求体接收受 stream flow control 流控窗口影响; 该值会影响请求处理前可预读的 body 数据量, 也会影响初始上传窗口
    # 如果该值过小, 高带宽、高 RTT、大文件上传场景下客户端可能频繁等待 WINDOW_UPDATE, 导致 HTTP/2 上传吞吐低于预期
    # 适当调大该值可改善对象存储上传、WebDAV、大文件 POST/PUT、测速上传等场景, 但高并发时会增加每请求内存占用
    # 普通网站/API/反代可保持默认 64k; 如存在 HTTP/2 上传吞吐瓶颈, 可结合 client_body_buffer_size 测试 128k/256k/512k
    # cloudflare 建议设置 TCP 接收缓冲区自动调优 net.ipv4.tcp_moderate_rcvbuf = 1
    http2_body_preread_size  128k; # 温和放大 HTTP/2 上传预读/流控窗口, 用于缓解大上传吞吐瓶颈, 需结合实际网络测试

    # 用于设置 HTTP/2 响应体切片的最大大小, 默认 8k
    # 该参数影响服务端向客户端发送响应 body 的切片大小, 不是请求体上传, 也不是最大响应大小
    # 值太小会把响应切得过碎, 增加 HTTP/2 frame、调度和发送处理开销
    # 值太大则单个大响应会占用更长的连续发送时间, 影响同一 HTTP/2 连接上其他 stream 的优先级调度, 可能加重 HOL blocking
    # 16k 相比默认 8k 更偏向大响应/下载吞吐, 适合镜像站、下载站、大静态资源场景测试使用
    http2_chunk_size  16k; # 将 HTTP/2 响应体切成更大的发送块, 减少切片/frame 处理开销, 适合大响应场景测试

    # 用于设置单个 HTTP/2 连接内允许并发的最大 stream 数量, 默认 128
    # HTTP/2 一个 TCP/TLS 连接中可以同时承载多个请求/响应, 每个请求/响应对应一个 stream
    # 数值越大, 单连接可并发处理的请求越多, 有利于资源较多的页面或高并发复用连接, 数值过大可能导致单个连接占用过多内存、请求处理资源和上游连接资源
    # 数值过小可能限制浏览器并发加载资源, 影响 HTTP/2 多路复用效果, 普通网站/API/反代通常保持默认 128 即可, 高资源页面或特殊客户端可测试 256
    http2_max_concurrent_streams  128;

    # 用于设置每个 worker 进程的 HTTP/2 输入接收缓冲区大小, 默认 256k
    # 该缓冲区用于接收和暂存客户端发送过来的 HTTP/2 帧数据, 包括 HEADERS、DATA 等帧
    # 它是 worker 级别的输入缓冲, 不是每个请求的上传缓冲, 也不是最大请求体大小
    # 数值过小可能在大量 HTTP/2 连接、gRPC 流式请求、大量 POST/PUT 上传等输入密集场景下增加读取和调度开销
    # 数值过大则会增加每个 worker 的内存占用, 普通 Web/API/反代场景通常没有必要调整
    # 绝大多数场景保持默认 256k 即可; 只有确认存在 HTTP/2 输入侧瓶颈时再测试增大
    http2_recv_buffer_size  256k; # 每个 worker 的 HTTP/2 输入缓冲区, 用于接收客户端发送的 HTTP/2 帧数据

    ## https://nginx.org/en/docs/http/ngx_http_acme_module.html
    # acme_issuer letsencrypt {
    #     uri  https://acme-v02.api.letsencrypt.org/directory;

    #     # challenge 用于指定 ACME 域名所有权验证方式, 可接受的值: http-01 (http) tls-alpn-01 (tls-alpn), 默认 http-01
    #     # http-01 通过 HTTP 80 端口验证, CA 会访问 http://域名/.well-known/acme-challenge/... 完成验证, 最常见也最稳
    #     # tls-alpn-01 通过 HTTPS 443 端口和特殊 ALPN 协议 acme-tls/1 验证, 适合不开放 80 端口、只走 443 的场景
    #     # ACME挑战具有版本控制, 如果指定了未版本化的名称, 模块会自动选择最新实现的版本
    #     # challenge http-01;

    #     contact  mailto:admin@example.com;

    #     # 启用或禁用 ACME 服务器证书验证, 默认 on
    #     ssl_verify on;

    #     # 定义一个用于存储模块数据的目录, 该目录的数据可以在重启后保留, 这可以通过跳过启动时的一些请求来缩短加载时间, 并避免达到 ACME 服务器的请求速率限制
    #     # 该目录包含 ACME 账户密钥、已签发证书和私钥等敏感内容, 应限制权限
    #     # 默认值: state_path acme_<issuer>;
    #     state_path  /var/cache/nginx/acme_letsencrypt;

    #     # 同意遵守ACME服务器的服务条款, 部分服务器要求在注册账户前接受服务条款, 这些条款通常可在ACME服务器的网站上找到, 如有必要相关网址将记录在错误日志中
    #     accept_terms_of_service;
    # }

    # 允许增加模块的内存存储空间, 共享内存区域将用于存储所有已配置证书颁发机构的已颁发证书、密钥和质询数据, 默认值 256k
    # 默认区域大小足以容纳大约 50 个 ECDSA prime256v1 密钥或 35 个 RSA 2048 密钥
    # acme_shared_zone zone=ngx_acme_shared:1M;

    ## https://nginx.org/en/docs/http/ngx_http_ssl_module.html
    # 用于设置 SSL/TLS 发送数据时的缓冲区大小, 默认情况下缓冲区大小为 16k
    # https://www.igvita.com/2013/12/16/optimizing-nginx-tls-time-to-first-byte
    # https://kubernetes.github.io/ingress-nginx/user-guide/nginx-configuration/configmap/#ssl-buffer-size Ingress-Nginx 把 `ssl-buffer-size` 默认值设为 4k 用于优化 TLS 场景下的 TTFB
    # 16k 适合镜像站、下载站、视频、大图片、压缩包、静态资源、大响应体等场景, 目标是提高吞吐、减少 TLS 发送次数, 降低 CPU/网络开销
    # 4k 适合登录页、后台、API、动态页面、小 HTML、小 JSON 响应等场景, 目标是更早发送第一批数据, 降低 TTFB (Time To First Byte) 让页面起始响应更快
    ssl_buffer_size  16k;

    # 用于缓存通过变量动态加载的 SSL 证书和私钥, 例如 $ssl_server_name
    # 固定证书路径通常不需要开启, 保持默认 off 即可; 动态 SNI、多域名证书目录、多租户 HTTPS 场景建议开启
    # max=2000 最多缓存 2000 组证书/私钥对象, 超出后按 LRU 淘汰; inactive=5m 表示 5 分钟未访问则移出缓存, 默认值为 10 秒; valid=20m 表示 20 分钟后重新加载或校验, 默认值为 60 秒
    ssl_certificate_cache  max=2000 inactive=5m valid=20m;
    # ssl_certificate_cache  off;

    # 用于启用 TLS 1.3 服务器证书压缩, 该参数不是压缩网页内容, 而是压缩 TLS 握手阶段发送的服务器证书链, 可减少握手数据量
    # 需要 Nginx 1.29.1+ 且 OpenSSL 3.2+; 使用 BoringSSL 时从 Nginx 1.29.3 起支持 zlib 算法
    # 仅在 TLS 1.3 且客户端支持证书压缩扩展时生效; 对证书链较长、频繁新建连接、高延迟网络更有意义
    ssl_certificate_compression  on;

    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256;

    # 用于指定 ECDHE/TLS 椭圆曲线列表, 默认 auto
    # auto 表示使用 OpenSSL 内置推荐曲线列表, 现代 OpenSSL 通常会自动选择兼容性和性能较好的曲线, 如果手动指定多个曲线, 使用冒号分隔, 例如 prime256v1:secp384r1
    # 使用 ECDSA 证书时, 必须确保列表中包含证书使用的曲线, 否则可能导致证书不可用
    ssl_ecdh_curve  auto;

    # 用于控制是否优先使用服务端的 ssl_ciphers 顺序选择密码套件, 默认 off
    # 该参数主要影响 TLS 1.2 及以下的密码套件选择; 对 TLS 1.3 场景意义较小
    # on 表示由服务端按 ssl_ciphers 配置顺序优先选择, 适合明确维护强密码套件顺序的场景
    # off 表示更偏向客户端自己的密码套件偏好, 现代配置中通常也可以保持默认
    ssl_prefer_server_ciphers  on;

    ssl_protocols  TLSv1.2 TLSv1.3;  # 使用TLSv1.2、TLSv1.3协议
    ssl_session_cache  shared:SSL:10m; # 用于在服务器端创建一个缓存区域，专门用来存储已建立的SSL/TLS连接的会话信息，实现SSL/TLS会话复用，10m 大约可以存储40000个会话

    # 用于手动指定 TLS Session Ticket 加密/解密密钥
    # 只有多节点需要共享 ticket key 或有明确密钥轮换方案时才建议配置
    # 长期固定且不轮换的 ticket key 会增加安全风险, 因此单机或无跨节点复用需求时通常不建议手动指定
    # 若开启 ssl_session_tickets 且使用 Nginx 1.23.2+ 的 shared ssl_session_cache, 可让 Nginx 自动生成、存储并定期轮换 ticket key
    # openssl rand 80 > /etc/nginx/certs/tls-ticket-active.key  # 当前 key, 用于加密新 ticket
    # openssl rand 80 > /etc/nginx/certs/tls-ticket-drain.key   # 旧 key, 用于解密存量 ticket, 等待自然过期
    # chmod 600 /etc/nginx/certs/tls-ticket-*.key
    # ssl_session_ticket_key  /etc/nginx/certs/tls-ticket-active.key;
    # ssl_session_ticket_key  /etc/nginx/certs/tls-ticket-drain.key;

    # https://datatracker.ietf.org/doc/html/rfc5077
    # 用于启用或禁用 TLS Session Ticket 会话复用, 默认 on
    # on 表示客户端可通过 session ticket 恢复 TLS 会话, 减少后续连接的握手开销
    # off 表示禁用 ticket 方式的会话复用, 更保守, 可避免长期固定 ticket key 带来的安全风险
    # 风险主要来自手动配置长期不轮换的 ssl_session_ticket_key; 如无跨节点共享需求, 通常不建议手动指定 ticket key
    # 如果已使用 ssl_session_cache 且 nginx 版本较新, 可让 nginx 自动管理 ticket key
    ssl_session_tickets  on;

    # 用于设置客户端可复用 TLS 会话参数的时间, 即客户端可以在多长时间内回来"复用"这个会话, 默认 5m
    # 时间越长, 客户端越容易复用旧会话, 可减少重复 TLS 握手开销, 但会话复用窗口也更长
    # 普通 HTTPS 站点常见可设为 1h~1d, 安全更保守可保持较短时间
    ssl_session_timeout  1h;

    # https://letsencrypt.org/2024/12/05/ending-ocsp
    # 用于启用服务器证书的 OCSP Stapling (在线证书状态协议装订) 功能, 默认 off
    # Let’s Encrypt 已于 2025-08-06 关闭 OCSP 服务, 并改为通过 CRL 发布吊销信息
    # 因此使用 Let’s Encrypt 证书时通常建议保持 off, 避免无意义的 OCSP 查询或 nginx 警告
    # 如果使用其他仍提供 OCSP responder 的 CA, 且证书包含 OCSP URL, 可按需开启
    ssl_stapling  off;

    # 用于校验 Nginx 获取到的 OCSP 响应, 确保服务器发送的证书状态可信, 默认 off
    # 仅在 ssl_stapling on 且正确配置 ssl_trusted_certificate 时才有意义
    ssl_stapling_verify  off;

    # 用于启用客户端证书校验, 默认 off
    # 该参数主要用于 mTLS / 双向 TLS / 客户端证书登录认证场景
    # on 表示必须提供并通过客户端证书校验; optional 表示有证书就校验, 没有也放行
    # optional_no_ca 表示请求客户端证书但不要求由可信 CA 签发, 通常用于后端服务自行校验证书
    # 普通 HTTPS 网站不校验客户端证书, 保持 off 即可
    ssl_verify_client  off;

    ## https://nginx.org/en/docs/http/ngx_http_headers_module.html
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always; # 启用HTTP严格传输安全HSTS头，强制浏览器仅通过HTTPS与服务器通信
    add_header X-Frame-Options "SAMEORIGIN" always; # 防止"点击劫持"(Clickjacking) 攻击，限制页面嵌套在同源框架中
    add_header X-Content-Type-Options "nosniff" always; # 禁止浏览器进行MIME类型嗅探，防止上传的恶意脚本被执行
    add_header Referrer-Policy "strict-origin-when-cross-origin" always; # 控制HTTPReferer头的内容,保护用户隐私避免泄露来源信息，no-referrer是一个最高级别的隐私，而牺牲大量分析功能和部分外部兼容性的决定
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), browsing-topics=()"; # 通过Permissions-Policy头限制特定的浏览器API，防止未经授权的访问
    # add_header Vary "Accept-Encoding" always; # 强制添加Vary头，告知缓存服务器根据Accept-Encoding进行内容变体存储

    # https://nginx.org/en/docs/http/ngx_http_limit_conn_module.html
    limit_conn_zone $binary_remote_addr zone=addr:20m; # 定义连接数限制的共享内存区域，使用客户端的二进制形式的IP地址作为键，定义共享内存区域大小
    limit_conn addr 150; # 应用连接数限制的指令，使用前面定义的区域，允许每个客户端IP地址的最大并发连接数
    limit_conn_dry_run  off; # 只在测试时开启
    limit_conn_log_level  error; # 当连接因超出限制被拒绝时，以info级别记录日志
    limit_conn_status  429; # 当某个客户端的连接数超过了limit_conn模块所设定的最大值时，返回HTTP429状态码，这意味着客户端已经达到了服务器允许的最大连接数，需要减少连接才能继续访问

    # https://nginx.org/en/docs/http/ngx_http_limit_req_module.html
    # 限制请求的频率（或称速率），而不是并发连接数，有效防止客户端在短时间内发起海量请求，从而防御暴力破解（如不断尝试登录密码）、API滥用、以及某些类型的CC攻击
    limit_req_zone $binary_remote_addr zone=reqip:50m rate=50r/s; # 定义请求速率限制的共享内存区域，使用客户端的二进制形式的IP地址作为键，内存区域大小为50MB，每秒平均请求速率为50个
    limit_req zone=reqip burst=150 nodelay; # 允许的最大突发请求数，请求不延迟处理
    limit_req_dry_run  off; # 只在测试时开启
    limit_req_log_level  error;
    limit_req_status  429; # 当请求超过limit_req模块设置的速率限制时，返回HTTP429状态码，而不是默认的503

    ##> fastcgi <##
    # https://nginx.org/en/docs/http/ngx_http_fastcgi_module.html
    # https://cloud.tencent.com/developer/article/1683437
    fastcgi_buffer_size 128k; # 读取从fastcgi服务器收到的响应第一部分的缓冲区大小 通过getconf PAGE_SIZE 获取，主流都为4096就等于4KB
    fastcgi_buffering on; # 启用fastcgi服务器的响应缓冲
    fastcgi_buffers 4 256k; # 用于设置从后端FastCGI服务器（如PHP-FPM）读取响应体（Response Body）时所使用的缓冲区数量和大小，是处理实际页面内容的主力缓冲
    fastcgi_busy_buffers_size 256k; # 处于"忙碌"状态的缓冲区的总大小，当它已经从后端PHP接收了数据、但这些数据还没有完全发送给客户端时，它就处于"忙碌"状态
    fastcgi_cache_background_update on; # 允许启动后台子请求来更新过期的缓存项，同时将过期的缓存响应返回给客户端
    fastcgi_cache_bypass $http_cookie; # 如果请求中包含Cookie，则绕过缓存
    fastcgi_no_cache $http_cookie; # 如果请求中包含Cookie，则不缓存响应
    fastcgi_cache_key "$scheme$request_method$host$request_uri"; # 设置fastcgi缓存键，包含请求的协议、方法、主机、URI和接收编码
    fastcgi_cache_lock on; # 启用缓存锁，防止多个请求同时处理相同的缓存未命中
    fastcgi_cache_lock_age 5s; # 它设置了"缓存锁"的最长等待时间
    fastcgi_cache_lock_timeout 5s; # 设置缓存锁超时时间为5秒
    fastcgi_cache_methods GET HEAD; # 指定缓存的请求方法，仅缓存GET和HEAD请求
    fastcgi_cache_min_uses 2; # 设置了一个响应在被至少请求了多少次之后，才会被写入缓存
    fastcgi_cache_path /var/cache/openresty/fastcgi_cache levels=1:2 keys_zone=fastcgi:20m max_size=1g inactive=30m; # 定义fastcgi缓存路径缓存层次为1:2，区域名为fastcgi 大小为20MB，最大缓存大小为1GB，30分钟后未被访问的缓存将被删除

    fastcgi_cache_valid 200 302 120m;
    fastcgi_cache_valid 301 1d;
    fastcgi_cache_valid 404 10m;
    fastcgi_cache_valid 500 502 503 504 0s;
    fastcgi_cache_valid any 1m;

    fastcgi_connect_timeout 10s; # 与fastcgi服务器建立连接的超时时间，此超时时间通常不能超过75秒
    fastcgi_hide_header "X-Powered-By"; # 隐藏fastcgi响应头中的X-Powered-By字段
    fastcgi_intercept_errors on; # 启用错误拦截使能够处理fastcgi返回的错误，而不是后端返回的错误原封不动地直接透传给用户
    fastcgi_keep_conn on; # 与后端fastcgi服务器（如PHP-FPM）之间的长连接（Keep-Alive）功能
    fastcgi_read_timeout 30s; # 从后端读取响应的超时
    fastcgi_send_timeout 15s; # 发送请求到后端的超时

    ##> proxy <##
    # https://nginx.org/en/docs/http/ngx_http_proxy_module.html
    proxy_buffer_size 128k; # 设置了用于读取被代理的后端HTTP服务器（例如一个Node.js或Java应用）响应的第一部分（通常是响应头）的专用缓冲区大小
    proxy_buffering on; # 反向代理功能的总开关，用于启用或禁用对后端服务器响应的缓冲
    proxy_buffers 16 16k; # 被代理的后端HTTP服务器读取响应体（Response Body）时所使用的缓冲区数量和大小
    proxy_busy_buffers_size 224k; # 从后端HTTP服务器接收响应时，"攒够"多少数据后就可以开始向客户端发送，这可以理解为"发往客户端的最低起送量"
    proxy_cache_background_update on; # 开启"后台异步更新缓存"功能，当缓存未命中时，允许新的请求更新缓存，它是防御"缓存雪崩"或"缓存惊群"（Cache Stampede / Thundering Herd）问题
    proxy_cache_bypass $arg_nocache $http_authorization $http_pragma; # 用于设置跳过不读取反向代理缓存的条件
    proxy_no_cache $arg_nocache $http_authorization $http_pragma; # 如果请求中包含则不缓存响应
    proxy_cache_key "$scheme$request_method$host$request_uri"; # 设置代理缓存键,包含请求的协议、方法、主机、URI和接收编码
    proxy_cache_lock on; # 启用缓存锁，防止多个请求同时处理相同的缓存未命中
    proxy_cache_lock_age 5s; # 设置锁本身的最长持有时间
    proxy_cache_lock_timeout 5s; # 设置单个请求等待锁的最长超时时间
    proxy_cache_methods GET HEAD; # 指定缓存的请求方法，仅缓存GET和HEAD请求
    proxy_cache_min_uses 2; # 一个资源至少要有第二次访问才被缓存
    proxy_cache_path /var/cache/openresty/proxy_cache levels=1:2 keys_zone=proxy:20m max_size=1g inactive=30m; # 定义代理缓存路径，缓存层次为1:2，区域名为proxy 大小为20MB最大缓存大小为1GB，30分钟后未被访问的缓存将被删除
    proxy_cache_revalidate on; # 开启过期缓存条件性验证

    proxy_cache_valid 200 302 120m;
    proxy_cache_valid 301 1d;
    proxy_cache_valid 404 10m;
    proxy_cache_valid 500 502 503 504 0s;
    proxy_cache_valid any 1m;

    proxy_connect_timeout 10s; # 设置与后端服务器建立连接的超时时间
    proxy_headers_hash_bucket_size 64; # 设置了用于存放代理头部哈希表中每个"桶"(Bucket)的大小
    proxy_headers_hash_max_size 512; # 设置了用于存放代理头部哈希表的最大容量
    proxy_hide_header "Server";
    proxy_hide_header "X-Powered-By"; # 隐藏代理请求响应头中的X-Powered-By字段
    proxy_intercept_errors on; # 启用错误拦截，使能够处理后端服务器返回的错误
    proxy_read_timeout 30s; # 被代理的后端HTTP服务器读取响应数据的超时时间，超时指的是在两次连续的读取操作之间的最长间隔
    proxy_send_timeout 15s; # 向后端服务器"发送请求"的写超时时间
    proxy_socket_keepalive on; # 与上游服务器（如后端 API、应用服务器）之间启用 TCP Keepalive（长连接）功能，以提高连接效率和性能

    include /etc/nginx/conf.d/*.conf;
}

include /etc/nginx/conf.d/*.main;
